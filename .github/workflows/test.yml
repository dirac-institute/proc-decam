name: Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  integration-test:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/${{ github.repository }}:lsst-w_2024_34
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      # Override Dockerfile's USER lsst so checkout actions can write to runner
      # directories (/__w/_temp/_runner_file_commands/) which are owned by root.
      options: --user root

    steps:
      - name: Checkout proc-decam (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout kbmod_imdiff_recipe (with LFS)
        uses: actions/checkout@v4
        with:
          repository: dirac-institute/kbmod_imdiff_recipe
          path: kbmod_imdiff_recipe
          lfs: true
          ref: stetzler/add-band-to-fakes

      - name: Checkout kbmod_mastercals_recipe (with LFS)
        uses: actions/checkout@v4
        with:
          repository: dirac-institute/kbmod_mastercals_recipe
          path: kbmod_mastercals_recipe
          lfs: true
          ref: main
          
      - name: Run pipeline
        shell: bash
        run: |
          # Load LSST stack from the container image
          source /opt/lsst/software/stack/loadLSST.bash
          setup lsst_distrib

          set -xeuo pipefail
          cd /home/lsst

          python tests/make_exposures.py \
            --mastercals-dir kbmod_mastercals_recipe/trimmedRawData/210318/calib \
            --science-dir kbmod_imdiff_recipe/trimmedRawData/210318/science \
            --output ${DATA}/exposures.ecsv \
            --image-dir ${DATA}/images

          # initdb and pg_ctl cannot run as root; switch to lsst user for db setup.
          # Give lsst user write access to the repo directory.
          WORKSPACE="$(pwd)"
          su -s /bin/bash lsst -c "source /opt/lsst/software/stack/loadLSST.bash; setup lsst_distrib; set -xeuo pipefail; cd '$WORKSPACE'; proc-decam db start ${REPO}"

          # ingest reference catalogs
          proc-decam refcats ${REPO} ${DATA}/exposures.ecsv
          
          # ingest fakes
          pushd kbmod_imdiff_recipe/trimmedRawData/fakes
          python create_fakes.py
          popd
          proc-decam fakes ${REPO} \
            kbmod_imdiff_recipe/trimmedRawData/fakes/fakes_fakeSrcCat.fits \
            --format fits

          proc-decam ingest ${DATA}/exposures.ecsv -b ${REPO} --image-dir ${DATA}/images/
          proc-decam raw ${REPO} bias 20210318
          proc-decam collection ${REPO} bias 20210318
          proc-decam execute ${REPO} 20210318/bias \
            --pipeline pipelines/bias.yaml#step1 \
            --where "instrument='DECam' and detector=35"
          # process nightly calibrations and exposures with parallelism 1
          # J=1 proc-decam night ${REPO} ${DATA}/exposures.ecsv \
          #  --where "instrument='DECam' and detector=35" -J 1
          
