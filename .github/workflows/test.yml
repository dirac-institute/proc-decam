name: Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Create Custom Dockerfile
        run: |
          cat <<EOF > Dockerfile
          FROM lsstsqre/centos:7-stack-lsst_distrib-w_2024_34
          USER root
          RUN yum install -y postgresql-server postgresql-contrib && yum clean all
          # Revert to the default stack user (usually 'lsst') 
          # so subsequent jobs don't run as root by default.
          USER lsst
          WORKDIR /home/lsst
          EOF

      - name: Build and Save Image
        run: |
          docker build -t custom-lsst:latest .
          docker save custom-lsst:latest > custom-lsst.tar

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsst-image
          path: custom-lsst.tar
          retention-days: 1

  integration-test:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: lsst-image

      - name: Load Image into Docker
        run: docker load < custom-lsst.tar
    
      - uses: actions/checkout@v4

      - name: Run pipeline
        shell: bash
        run: |
          chmod -R a+rw .
          docker run --rm \
            -v $GITHUB_WORKSPACE:/home/lsst/work \
            -w /home/lsst/work \
            custom-lsst:latest /bin/bash -c "
              source /opt/lsst/software/stack/loadLSST.bash
              setup lsst_distrib
              
              pip install .
              
              git clone https://github.com/dirac-institute/kbmod_imdiff_recipe.git &
              git clone https://github.com/dirac-institute/kbmod_mastercals_recipe.git &
              wait

              python tests/make_exposures.py \
                --mastercals-dir kbmod_mastercals_recipe/trimmedRawData/210318/calib \
                --science-dir kbmod_imdiff_recipe/trimmedRawData/210318/science \
                --output ./data/exposures.ecsv \
                --image-dir ./data/images

              proc-decam db create ./repo
              proc-decam db start ./repo
              {
                butler register-instrument ./repo lsst.obs.decam.DarkEnergyCamera
                butler write-curated-calibrations ./repo lsst.obs.decam.DarkEnergyCamera
              } &
              {
                butler register-skymap ./repo -c name='discrete'
              } &
              {
                proc-decam refcats ./repo ./data/exposures.ecsv
              } &
              {
                cd kbmod_imdiff_recipe/trimmedRawData/fakes
                git checkout stetzler/add-band-to-fakes
                python create_fakes.py
                cd ../../..
                proc-decam fakes ./repo \
                  kbmod_imdiff_recipe/trimmedRawData/fakes/fakes_fakeSrcCat.fits \
                  --format fits
              } &
              wait
              proc-decam night ./repo ./data/exposures.ecsv \
                --where \"instrument='DECam' and detector=35\" \
                --debug
              proc-decam coadd ./repo \"*\" \
                --coadd-subset all \
                --template-type meanclip \
                --warp-coadd-name deep \
                --debug
            "
